<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gauge Chart</title>
  <script src="https://public.tableau.com/javascripts/api/tableau.extensions.1.latest.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:transparent; }
    #wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    svg#g { overflow:visible; display:block; }

    #cfg-panel {
      position:fixed; inset:0; background:rgba(0,0,0,.5);
      display:none; align-items:center; justify-content:center; z-index:99;
    }
    #cfg-panel.on { display:flex; }
    .box { background:#fff; border-radius:8px; padding:22px; min-width:310px; font-family:Arial,sans-serif; box-shadow:0 4px 20px rgba(0,0,0,.25); }
    .box h2 { font-size:14px; color:#0B2545; margin-bottom:12px; }
    .row { display:flex; align-items:center; margin-bottom:8px; gap:6px; }
    .row label { width:135px; font-size:12px; color:#555; }
    .row input[type=number],.row input[type=text] { flex:1; padding:4px 7px; border:1px solid #ccc; border-radius:4px; font-size:12px; }
    .row input[type=color] { width:36px; height:26px; padding:1px; border:1px solid #ccc; border-radius:4px; cursor:pointer; }
    .cv { width:66px!important; flex:none!important; }
    .btns { display:flex; gap:8px; margin-top:14px; justify-content:flex-end; }
    .ok  { background:#0B2545; color:#fff; border:none; border-radius:4px; padding:7px 18px; cursor:pointer; font-size:12px; }
    .ok:hover { background:#13A8A8; }
    .can { background:#eee; color:#333; border:none; border-radius:4px; padding:7px 14px; cursor:pointer; font-size:12px; }
  </style>
</head>
<body>
<div id="wrap"><svg id="g" viewBox="-120 -105 240 140" width="100%" height="100%"></svg></div>

<div id="cfg-panel">
  <div class="box">
    <h2>âš™ Configurar Gauge</h2>
    <div class="row"><label>MÃ­nimo</label><input type="number" id="i-min" value="0"/></div>
    <div class="row"><label>MÃ¡x segmento Verde</label><input type="number" id="i-s1" value="33"/></div>
    <div class="row"><label>MÃ¡x segmento Amarillo</label><input type="number" id="i-s2" value="67"/></div>
    <div class="row"><label>MÃ¡ximo total</label><input type="number" id="i-max" value="100"/></div>
    <div class="row"><label>Color Verde</label><input type="color" id="i-c1" value="#3e8e2a"/><input type="text" class="cv" id="i-c1t" value="#3e8e2a"/></div>
    <div class="row"><label>Color Amarillo</label><input type="color" id="i-c2" value="#f2e52c"/><input type="text" class="cv" id="i-c2t" value="#f2e52c"/></div>
    <div class="row"><label>Color Rojo</label><input type="color" id="i-c3" value="#ff0000"/><input type="text" class="cv" id="i-c3t" value="#ff0000"/></div>
    <div class="row"><label>Sufijo etiqueta</label><input type="text" id="i-sfx" value=" min."/></div>
    <div class="row"><label>Decimales</label><input type="number" id="i-dec" value="0" min="0" max="3"/></div>
    <div class="btns">
      <button class="can" id="b-can">Cancelar</button>
      <button class="ok"  id="b-ok">Guardar</button>
    </div>
  </div>
</div>

<script>
// â”€â”€ CONFIG â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
var C = { min:0, s1:33, s2:67, max:100, c1:'#3e8e2a', c2:'#f2e52c', c3:'#ff0000', sfx:' min.', dec:0 };
var curVal = null;

// â”€â”€ GEOMETRY â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function r2d(a){ return (a-180)*Math.PI/180; }
function xy(a,r){ return [+(r*Math.cos(r2d(a))).toFixed(3), +(r*Math.sin(r2d(a))).toFixed(3)]; }
function arcD(r,a1,a2){
  var s=xy(a1,r), e=xy(a2,r), lg=(a2-a1)>180?1:0;
  return 'M'+s[0]+' '+s[1]+' A'+r+' '+r+' 0 '+lg+' 1 '+e[0]+' '+e[1];
}
function v2a(v){ return 180 - Math.max(0,Math.min(1,(v-C.min)/(C.max-C.min)))*180; }

// â”€â”€ DRAW â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function draw(val){
  var svg=document.getElementById('g');
  var OR=95, SW=32;
  var a0=180, a1=v2a(C.s1), a2=v2a(C.s2), a3=0;
  var h='';

  // Arco verde
  h+='<path d="'+arcD(OR,a0,a1)+'" fill="none" stroke="'+C.c1+'" stroke-width="'+SW+'" stroke-linecap="butt"/>';
  // Arco amarillo
  if(a1>a2+0.5) h+='<path d="'+arcD(OR,a1,a2)+'" fill="none" stroke="'+C.c2+'" stroke-width="'+SW+'" stroke-linecap="butt"/>';
  // Arco rojo
  if(a2>a3+0.5) h+='<path d="'+arcD(OR,a2,a3)+'" fill="none" stroke="'+C.c3+'" stroke-width="'+SW+'" stroke-linecap="butt"/>';

  // Separadores blancos entre segmentos
  [a0,a1,a2,a3].forEach(function(a){
    var p1=xy(a,OR-SW/2-2), p2=xy(a,OR+SW/2+2);
    h+='<line x1="'+p1[0]+'" y1="'+p1[1]+'" x2="'+p2[0]+'" y2="'+p2[1]+'" stroke="white" stroke-width="2.5"/>';
  });

  // Ticks en umbrales
  [C.min,C.s1,C.s2,C.max].forEach(function(v){
    var a=v2a(v), t1=xy(a,OR+4), t2=xy(a,OR+13), tl=xy(a,OR+24);
    h+='<line x1="'+t1[0]+'" y1="'+t1[1]+'" x2="'+t2[0]+'" y2="'+t2[1]+'" stroke="#555" stroke-width="1.5"/>';
    var lbl=(v%1===0)?String(v):v.toFixed(1);
    h+='<text x="'+tl[0]+'" y="'+tl[1]+'" font-family="Arial,sans-serif" font-size="10" fill="#444" text-anchor="middle" dominant-baseline="central">'+lbl+'</text>';
  });

  // LÃ­nea base
  h+='<line x1="-'+(OR+2)+'" y1="0" x2="'+(OR+2)+'" y2="0" stroke="#ccc" stroke-width="1"/>';

  // Aguja y score
  if(val!==null && !isNaN(val)){
    var na=v2a(val), np=xy(na,OR-6), b1=xy(na+90,7), b2=xy(na-90,7);
    h+='<polygon points="'+np[0]+','+np[1]+' '+b1[0]+','+b1[1]+' '+b2[0]+','+b2[1]+'" fill="#111" stroke="none"/>';
    h+='<circle cx="0" cy="0" r="9" fill="#111"/>';
    h+='<circle cx="0" cy="0" r="5" fill="white"/>';
    var lbl=parseFloat(val).toFixed(C.dec)+C.sfx;
    h+='<text x="0" y="28" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#222" text-anchor="middle">'+lbl+'</text>';
  } else {
    h+='<circle cx="0" cy="0" r="9" fill="#bbb"/>';
    h+='<circle cx="0" cy="0" r="5" fill="white"/>';
    h+='<text x="0" y="28" font-family="Arial,sans-serif" font-size="11" fill="#999" text-anchor="middle">Sin datos</text>';
  }
  svg.innerHTML = h;
}

// â”€â”€ CONFIG PANEL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
['c1','c2','c3'].forEach(function(id){
  var pk=document.getElementById('i-'+id), tx=document.getElementById('i-'+id+'t');
  pk.addEventListener('input',function(){ tx.value=pk.value; });
  tx.addEventListener('input',function(){ if(/^#[0-9a-fA-F]{6}$/.test(tx.value)) pk.value=tx.value; });
});

function openCfg(){
  document.getElementById('i-min').value = C.min;
  document.getElementById('i-s1').value  = C.s1;
  document.getElementById('i-s2').value  = C.s2;
  document.getElementById('i-max').value = C.max;
  ['c1','c2','c3'].forEach(function(id){
    document.getElementById('i-'+id).value  = C[id];
    document.getElementById('i-'+id+'t').value = C[id];
  });
  document.getElementById('i-sfx').value = C.sfx;
  document.getElementById('i-dec').value = C.dec;
  document.getElementById('cfg-panel').classList.add('on');
}

document.getElementById('b-can').addEventListener('click',function(){ document.getElementById('cfg-panel').classList.remove('on'); });
document.getElementById('b-ok').addEventListener('click',function(){
  C.min = parseFloat(document.getElementById('i-min').value)||0;
  C.s1  = parseFloat(document.getElementById('i-s1').value)||33;
  C.s2  = parseFloat(document.getElementById('i-s2').value)||67;
  C.max = parseFloat(document.getElementById('i-max').value)||100;
  ['c1','c2','c3'].forEach(function(id){ C[id]=document.getElementById('i-'+id+'t').value; });
  C.sfx = document.getElementById('i-sfx').value;
  C.dec = parseInt(document.getElementById('i-dec').value)||0;
  try { tableau.extensions.settings.set('gaugeCfg',JSON.stringify(C)); tableau.extensions.settings.saveAsync(); } catch(e){}
  document.getElementById('cfg-panel').classList.remove('on');
  draw(curVal);
});

// â”€â”€ LEER DATOS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function getData(){
  try {
    var ws = tableau.extensions.worksheetContent.worksheet;
    ws.getSummaryDataAsync({ maxRows:1, ignoreSelection:true, includeAllColumns:true })
      .then(function(dt){
        if(!dt.data || dt.data.length===0){ draw(null); return; }
        var row=dt.data[0], cols=dt.columns, val=null;
        // Buscar primer valor numÃ©rico
        for(var i=0;i<cols.length;i++){
          var v=parseFloat(row[i].nativeValue!==undefined ? row[i].nativeValue : row[i].value);
          if(!isNaN(v)){ val=v; break; }
        }
        curVal=val; draw(val);
      })
      .catch(function(){ draw(null); });
  } catch(e){ draw(null); }
}

// â”€â”€ INIT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
tableau.extensions.initializeAsync({ configure: openCfg })
  .then(function(){
    try { var s=tableau.extensions.settings.get('gaugeCfg'); if(s) C=Object.assign(C,JSON.parse(s)); } catch(e){}
    getData();
    try {
      tableau.extensions.worksheetContent.worksheet
        .addEventListener(tableau.TableauEventType.SummaryDataChanged, getData);
    } catch(e){}
  })
  .catch(function(){
    // Demo fuera de Tableau
    draw(75);
  });
</script>
</body>
</html>
