<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Test</title>
  <script src="https://public.tableau.com/javascripts/api/tableau.extensions.1.latest.min.js"></script>
  <style>
    body { font-family: Arial; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
    #val { font-size: 48px; font-weight: bold; color: #0B2545; }
    #status { font-size: 14px; color: #666; margin-top: 10px; max-width: 400px; text-align: center; }
  </style>
</head>
<body>
  <div id="val">--</div>
  <div id="status">Iniciando...</div>
<script>
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function setVal(v) { document.getElementById('val').textContent = v !== null ? v : '--'; }

tableau.extensions.initializeAsync()
  .then(function() {
    setStatus('Init OK. Leyendo datos...');
    var ws = tableau.extensions.worksheetContent.worksheet;
    setStatus('Worksheet: ' + ws.name + '. Intentando leer...');

    ws.addEventListener(tableau.TableauEventType.SummaryDataChanged, function() {
      setStatus('SummaryDataChanged! Leyendo...');
      readData(ws);
    });

    readData(ws);
  })
  .catch(function(e) { setStatus('Init ERROR: ' + e); });

function readData(ws) {
  ws.getSummaryDataReaderAsync()
    .then(function(reader) {
      return reader.getAllPagesAsync().then(function(dt) {
        reader.releaseAsync();
        setStatus('Rows: ' + dt.data.length + ' Cols: ' + dt.columns.length + ' | ' + dt.columns.map(function(c){return c.fieldName+':'+c.dataType;}).join(', '));
        if (dt.data.length > 0) {
          var row = dt.data[0];
          for (var i = 0; i < row.length; i++) {
            var v = parseFloat(row[i].nativeValue !== undefined ? row[i].nativeValue : row[i].value);
            if (!isNaN(v) && isFinite(v)) { setVal(v); return; }
          }
          setVal(null);
        } else {
          setVal(null);
        }
      });
    })
    .catch(function(e) { setStatus('ERROR getSummaryDataReader: ' + e); setVal(null); });
}
</script>
</body>
</html>
