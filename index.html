<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Gauge Chart</title>
  <script src="https://public.tableau.com/javascripts/api/tableau.extensions.1.latest.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:transparent; }
    #wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    svg { display:block; overflow:visible; }
    #panel { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:9; }
    #panel.show { display:flex; }
    .box { background:#fff; border-radius:8px; padding:22px; width:300px; font-family:Arial,sans-serif; box-shadow:0 4px 24px rgba(0,0,0,.3); }
    .box h3 { font-size:13px; color:#0B2545; margin-bottom:12px; }
    .r { display:flex; align-items:center; margin-bottom:7px; gap:6px; }
    .r label { width:130px; font-size:11px; color:#555; flex-shrink:0; }
    .r input[type=number], .r input[type=text] { flex:1; padding:4px 6px; border:1px solid #ccc; border-radius:3px; font-size:11px; }
    .r input[type=color] { width:34px; height:24px; border:1px solid #ccc; border-radius:3px; padding:1px; cursor:pointer; }
    .cv { width:62px!important; flex:none!important; }
    .btns { display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }
    .ok { background:#0B2545; color:#fff; border:none; border-radius:4px; padding:6px 16px; cursor:pointer; font-size:11px; }
    .ok:hover { background:#13A8A8; }
    .cn { background:#eee; color:#333; border:none; border-radius:4px; padding:6px 12px; cursor:pointer; font-size:11px; }
  </style>
</head>
<body>
<div id="wrap">
  <!-- viewBox centrado en 0,0: arco arriba (-Y), score abajo (+Y) -->
  <svg id="g" viewBox="-115 -105 230 140" width="100%" height="100%"></svg>
</div>
<div id="panel">
  <div class="box">
    <h3>⚙ Configurar Gauge</h3>
    <div class="r"><label>Mínimo</label><input type="number" id="mn" value="0"/></div>
    <div class="r"><label>Máx Verde</label><input type="number" id="s1" value="33"/></div>
    <div class="r"><label>Máx Amarillo</label><input type="number" id="s2" value="67"/></div>
    <div class="r"><label>Máximo total</label><input type="number" id="mx" value="100"/></div>
    <div class="r"><label>Color Verde</label><input type="color" id="c1" value="#3e8e2a"/><input type="text" class="cv" id="c1t" value="#3e8e2a"/></div>
    <div class="r"><label>Color Amarillo</label><input type="color" id="c2" value="#f2e52c"/><input type="text" class="cv" id="c2t" value="#f2e52c"/></div>
    <div class="r"><label>Color Rojo</label><input type="color" id="c3" value="#ff0000"/><input type="text" class="cv" id="c3t" value="#ff0000"/></div>
    <div class="r"><label>Sufijo (ej: min.)</label><input type="text" id="sx" value=" min."/></div>
    <div class="r"><label>Decimales</label><input type="number" id="dc" value="0" min="0" max="3"/></div>
    <div class="btns">
      <button class="cn" id="bcn">Cancelar</button>
      <button class="ok" id="bok">Guardar</button>
    </div>
  </div>
</div>
<script>
var C = {mn:0, s1:33, s2:67, mx:100, c1:'#3e8e2a', c2:'#f2e52c', c3:'#ff0000', sx:' min.', dc:0};
var curVal = null;

// ── GEOMETRÍA ────────────────────────────────────────────────────
// Semicírculo SUPERIOR: empieza en (-R, 0) izquierda y termina en (R, 0) derecha
// pasando por (0, -R) arriba.
// En SVG: ángulo 180° = izquierda, 0° = derecha
// Para el arco SUPERIOR usamos sweep-flag=0 (antihorario en SVG donde Y crece abajo)
// Resultado: arco va por ARRIBA

function rad(deg){ return deg * Math.PI / 180; }

// Coordenadas en el círculo: 0°=der, 90°=abajo, 180°=izq, 270°=arriba
function pt(angleDeg, r){
  return [
    +(r * Math.cos(rad(angleDeg))).toFixed(3),
    +(r * Math.sin(rad(angleDeg))).toFixed(3)
  ];
}

// Valor → ángulo: mn=180°(izq), mx=0°(der), semicírculo superior
function v2a(v){
  var pct = Math.max(0, Math.min(1, (v - C.mn) / (C.mx - C.mn)));
  return 180 - pct * 180;
}

// Arco superior de a1 a a2 (a1 > a2, ambos en [0,180])
// sweep=0 = antihorario en SVG = arco que pasa por ARRIBA
function arcPath(r, a1, a2){
  var s = pt(a1, r), e = pt(a2, r);
  var largeArc = (a1 - a2) > 180 ? 1 : 0;
  return 'M'+s[0]+' '+s[1]+' A'+r+' '+r+' 0 '+largeArc+' 0 '+e[0]+' '+e[1];
}

// ── DRAW ─────────────────────────────────────────────────────────
function draw(val){
  var OR = 90, SW = 26;
  var aL  = 180;       // izquierda = mínimo (verde empieza aquí)
  var a1  = v2a(C.s1); // fin verde / inicio amarillo
  var a2  = v2a(C.s2); // fin amarillo / inicio rojo
  var aR  = 0;         // derecha = máximo (rojo termina aquí)
  var h = '';

  // Segmento VERDE: izq → a1
  h += '<path d="'+arcPath(OR,aL,a1)+'" fill="none" stroke="'+C.c1+'" stroke-width="'+SW+'" stroke-linecap="butt"/>';
  // Segmento AMARILLO: a1 → a2
  if(a1 - a2 > 0.3)
    h += '<path d="'+arcPath(OR,a1,a2)+'" fill="none" stroke="'+C.c2+'" stroke-width="'+SW+'" stroke-linecap="butt"/>';
  // Segmento ROJO: a2 → der
  if(a2 - aR > 0.3)
    h += '<path d="'+arcPath(OR,a2,aR)+'" fill="none" stroke="'+C.c3+'" stroke-width="'+SW+'" stroke-linecap="butt"/>';

  // Separadores blancos
  [aL, a1, a2, aR].forEach(function(a){
    var p1 = pt(a, OR - SW/2 - 1), p2 = pt(a, OR + SW/2 + 1);
    h += '<line x1="'+p1[0]+'" y1="'+p1[1]+'" x2="'+p2[0]+'" y2="'+p2[1]+'" stroke="white" stroke-width="2"/>';
  });

  // Ticks y etiquetas
  [{v:C.mn,a:aL},{v:C.s1,a:a1},{v:C.s2,a:a2},{v:C.mx,a:aR}].forEach(function(o){
    var t1 = pt(o.a, OR+3), t2 = pt(o.a, OR+11), tl = pt(o.a, OR+22);
    h += '<line x1="'+t1[0]+'" y1="'+t1[1]+'" x2="'+t2[0]+'" y2="'+t2[1]+'" stroke="#555" stroke-width="1.5"/>';
    var lbl = (o.v%1===0) ? String(o.v) : o.v.toFixed(1);
    h += '<text x="'+tl[0]+'" y="'+tl[1]+'" font-family="Arial,sans-serif" font-size="9.5" fill="#444" text-anchor="middle" dominant-baseline="central">'+lbl+'</text>';
  });

  // Línea base
  h += '<line x1="-'+(OR+2)+'" y1="0" x2="'+(OR+2)+'" y2="0" stroke="#ddd" stroke-width="1"/>';

  // Aguja — apunta desde el centro hacia el arco
  var dispVal = (val !== null && !isNaN(val)) ? val : C.mn;
  var na  = v2a(dispVal);
  var tip = pt(na, OR - 5);
  var b1  = pt(na + 90, 6);
  var b2  = pt(na - 90, 6);
  h += '<polygon points="'+tip[0]+','+tip[1]+' '+b1[0]+','+b1[1]+' '+b2[0]+','+b2[1]+'" fill="#111"/>';
  h += '<circle cx="0" cy="0" r="8" fill="#111"/>';
  h += '<circle cx="0" cy="0" r="4" fill="white"/>';

  // Score
  var label = (val !== null && !isNaN(val))
    ? parseFloat(val).toFixed(C.dc) + C.sx
    : '--' + C.sx.trim();
  h += '<text x="0" y="26" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#222" text-anchor="middle">'+label+'</text>';

  document.getElementById('g').innerHTML = h;
}

// ── CONFIG PANEL ─────────────────────────────────────────────────
['c1','c2','c3'].forEach(function(id){
  var pk = document.getElementById(id), tx = document.getElementById(id+'t');
  pk.addEventListener('input', function(){ tx.value = pk.value; });
  tx.addEventListener('input', function(){ if(/^#[0-9a-fA-F]{6}$/.test(tx.value)) pk.value = tx.value; });
});
function openCfg(){
  document.getElementById('mn').value=C.mn; document.getElementById('s1').value=C.s1;
  document.getElementById('s2').value=C.s2; document.getElementById('mx').value=C.mx;
  ['c1','c2','c3'].forEach(function(id){
    document.getElementById(id).value=C[id]; document.getElementById(id+'t').value=C[id];
  });
  document.getElementById('sx').value=C.sx; document.getElementById('dc').value=C.dc;
  document.getElementById('panel').classList.add('show');
}
document.getElementById('bcn').addEventListener('click', function(){ document.getElementById('panel').classList.remove('show'); });
document.getElementById('bok').addEventListener('click', function(){
  C.mn = parseFloat(document.getElementById('mn').value)||0;
  C.s1 = parseFloat(document.getElementById('s1').value)||33;
  C.s2 = parseFloat(document.getElementById('s2').value)||67;
  C.mx = parseFloat(document.getElementById('mx').value)||100;
  ['c1','c2','c3'].forEach(function(id){ C[id] = document.getElementById(id+'t').value; });
  C.sx = document.getElementById('sx').value;
  C.dc = parseInt(document.getElementById('dc').value)||0;
  try{ tableau.extensions.settings.set('cfg',JSON.stringify(C)); tableau.extensions.settings.saveAsync(); }catch(e){}
  document.getElementById('panel').classList.remove('show');
  draw(curVal);
});

// ── LEER DATOS ───────────────────────────────────────────────────
function getData(){
  try{
    var ws = tableau.extensions.worksheetContent.worksheet;
    ws.getSummaryDataAsync({maxRows:1, ignoreSelection:true, includeAllColumns:true})
      .then(function(dt){
        if(!dt||!dt.data||dt.data.length===0){ draw(null); return; }
        var row=dt.data[0], val=null;
        for(var i=0;i<row.length;i++){
          var raw=(row[i].nativeValue!==undefined&&row[i].nativeValue!==null)?row[i].nativeValue:row[i].value;
          var v=parseFloat(raw);
          if(!isNaN(v)&&isFinite(v)){val=v;break;}
        }
        curVal=val; draw(val);
      })
      .catch(function(){ draw(null); });
  }catch(e){ draw(null); }
}

// ── INIT ─────────────────────────────────────────────────────────
draw(null);

tableau.extensions.initializeAsync({configure:openCfg})
  .then(function(){
    try{ var s=tableau.extensions.settings.get('cfg'); if(s) C=Object.assign(C,JSON.parse(s)); }catch(e){}
    draw(null);
    getData();
    try{
      tableau.extensions.worksheetContent.worksheet
        .addEventListener(tableau.TableauEventType.SummaryDataChanged, getData);
    }catch(e){}
  })
  .catch(function(){ draw(75); });
</script>
</body>
</html>
