<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gauge Chart</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tableau-extensions-api/1.11.0/tableau.extensions.api.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #container {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    svg#gauge { width: 100%; height: 100%; overflow: visible; }

    #config-panel {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center;
      z-index: 999;
    }
    #config-panel.open { display: flex; }
    .config-box {
      background: #fff; border-radius: 8px;
      padding: 24px; min-width: 320px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      font-family: Arial, sans-serif;
    }
    .config-box h2 { font-size: 15px; margin-bottom: 14px; color: #0B2545; }
    .config-row { display: flex; align-items: center; margin-bottom: 9px; gap: 8px; }
    .config-row label { width: 130px; font-size: 12px; color: #555; }
    .config-row input[type=number], .config-row input[type=text] {
      flex: 1; padding: 5px 7px; border: 1px solid #ccc;
      border-radius: 4px; font-size: 12px;
    }
    .config-row input[type=color] { width: 38px; height: 26px; padding: 1px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
    .color-val { width: 68px !important; flex: none !important; }
    .btn-row { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
    .btn-ok { background: #0B2545; color: #fff; border: none; border-radius: 4px; padding: 7px 18px; cursor: pointer; font-size: 12px; }
    .btn-cancel { background: #eee; color: #333; border: none; border-radius: 4px; padding: 7px 14px; cursor: pointer; font-size: 12px; }
    .btn-ok:hover { background: #13A8A8; }
  </style>
</head>
<body>
<div id="container">
  <svg id="gauge" viewBox="-120 -105 240 140" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div id="config-panel">
  <div class="config-box">
    <h2>⚙ Configurar Gauge</h2>
    <div class="config-row"><label>Mínimo</label><input type="number" id="cfg-min" value="0"/></div>
    <div class="config-row"><label>Máx seg.1 (Verde)</label><input type="number" id="cfg-s1" value="33"/></div>
    <div class="config-row"><label>Máx seg.2 (Amarillo)</label><input type="number" id="cfg-s2" value="67"/></div>
    <div class="config-row"><label>Máximo total</label><input type="number" id="cfg-max" value="100"/></div>
    <div class="config-row"><label>Color Verde</label><input type="color" id="cfg-c1" value="#3e8e2a"/><input type="text" class="color-val" id="cfg-c1t" value="#3e8e2a"/></div>
    <div class="config-row"><label>Color Amarillo</label><input type="color" id="cfg-c2" value="#f2e52c"/><input type="text" class="color-val" id="cfg-c2t" value="#f2e52c"/></div>
    <div class="config-row"><label>Color Rojo</label><input type="color" id="cfg-c3" value="#ff0000"/><input type="text" class="color-val" id="cfg-c3t" value="#ff0000"/></div>
    <div class="config-row"><label>Sufijo (ej: " min.")</label><input type="text" id="cfg-suffix" value=" min."/></div>
    <div class="config-row"><label>Decimales</label><input type="number" id="cfg-dec" value="0" min="0" max="3"/></div>
    <div class="btn-row">
      <button class="btn-cancel" id="btn-cancel">Cancelar</button>
      <button class="btn-ok" id="btn-ok">Guardar</button>
    </div>
  </div>
</div>

<script>
// ── CONFIGURACIÓN ────────────────────────────────────────────────
var cfg = { min:0, s1:33, s2:67, max:100, c1:'#3e8e2a', c2:'#f2e52c', c3:'#ff0000', suffix:' min.', decimals:0 };
var currentValue = null;

// ── SVG HELPERS ──────────────────────────────────────────────────
function deg2rad(d){ return (d - 180) * Math.PI / 180; }
function pt(angleDeg, r){ return { x: r*Math.cos(deg2rad(angleDeg)), y: r*Math.sin(deg2rad(angleDeg)) }; }

function arc(r, a1, a2){
  var s = pt(a1, r), e = pt(a2, r);
  var large = (a2 - a1) > 180 ? 1 : 0;
  return 'M '+s.x.toFixed(3)+' '+s.y.toFixed(3)+' A '+r+' '+r+' 0 '+large+' 1 '+e.x.toFixed(3)+' '+e.y.toFixed(3);
}

function valToAngle(v){
  var pct = Math.max(0, Math.min(1, (v - cfg.min) / (cfg.max - cfg.min)));
  return 180 - pct * 180;
}

// ── DRAW ─────────────────────────────────────────────────────────
function draw(value){
  var svg = document.getElementById('gauge');
  var OR = 95, strokeW = 32, IR = OR - strokeW;
  var a0=180, a1=valToAngle(cfg.s1), a2=valToAngle(cfg.s2), a3=0;
  var h = '';

  // Segmentos del arco
  h += '<path d="'+arc(OR,a0,a1)+'" fill="none" stroke="'+cfg.c1+'" stroke-width="'+strokeW+'" stroke-linecap="butt"/>';
  if(a1 > a2+0.1) h += '<path d="'+arc(OR,a1,a2)+'" fill="none" stroke="'+cfg.c2+'" stroke-width="'+strokeW+'" stroke-linecap="butt"/>';
  if(a2 > a3+0.1) h += '<path d="'+arc(OR,a2,a3)+'" fill="none" stroke="'+cfg.c3+'" stroke-width="'+strokeW+'" stroke-linecap="butt"/>';

  // Bordes blancos para dar sensación de separación entre segmentos
  [a0,a1,a2,a3].forEach(function(ang){
    var p1=pt(ang,IR-1), p2=pt(ang,OR+1);
    h += '<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="white" stroke-width="2"/>';
  });

  // Ticks y etiquetas
  var tickVals = [cfg.min, cfg.s1, cfg.s2, cfg.max];
  tickVals.forEach(function(v){
    var ang = valToAngle(v);
    var p1 = pt(ang, OR+3), p2 = pt(ang, OR+11);
    var pl = pt(ang, OR+22);
    h += '<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="#555" stroke-width="1.5"/>';
    var label = (v%1===0) ? String(v) : v.toFixed(1);
    h += '<text x="'+pl.x+'" y="'+pl.y+'" font-family="Arial,sans-serif" font-size="10" fill="#444" text-anchor="middle" dominant-baseline="central">'+label+'</text>';
  });

  // Línea base
  h += '<line x1="-'+OR+'" y1="0" x2="'+OR+'" y2="0" stroke="#ddd" stroke-width="1"/>';

  // Aguja y valor central
  if(value !== null && !isNaN(value)){
    var needleAng = valToAngle(value);
    var np = pt(needleAng, OR - 4);
    var nb1 = pt(needleAng + 90, 7), nb2 = pt(needleAng - 90, 7);
    h += '<polygon points="'+np.x.toFixed(2)+','+np.y.toFixed(2)+' '+nb1.x.toFixed(2)+','+nb1.y.toFixed(2)+' '+nb2.x.toFixed(2)+','+nb2.y.toFixed(2)+'" fill="#111"/>';
    h += '<circle cx="0" cy="0" r="8" fill="#111"/>';
    h += '<circle cx="0" cy="0" r="4.5" fill="white"/>';
    var display = parseFloat(value).toFixed(cfg.decimals) + cfg.suffix;
    h += '<text x="0" y="28" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#222" text-anchor="middle">'+display+'</text>';
  } else {
    h += '<circle cx="0" cy="0" r="8" fill="#aaa"/>';
    h += '<circle cx="0" cy="0" r="4.5" fill="white"/>';
    h += '<text x="0" y="28" font-family="Arial,sans-serif" font-size="11" fill="#999" text-anchor="middle">Sin datos</text>';
  }

  svg.innerHTML = h;
}

// ── CONFIG PANEL ─────────────────────────────────────────────────
['c1','c2','c3'].forEach(function(id){
  var picker = document.getElementById('cfg-'+id);
  var text   = document.getElementById('cfg-'+id+'t');
  picker.addEventListener('input', function(){ text.value = picker.value; });
  text.addEventListener('input', function(){ if(/^#[0-9a-fA-F]{6}$/.test(text.value)) picker.value = text.value; });
});

function openConfig(){
  document.getElementById('cfg-min').value    = cfg.min;
  document.getElementById('cfg-s1').value     = cfg.s1;
  document.getElementById('cfg-s2').value     = cfg.s2;
  document.getElementById('cfg-max').value    = cfg.max;
  document.getElementById('cfg-c1').value     = cfg.c1; document.getElementById('cfg-c1t').value = cfg.c1;
  document.getElementById('cfg-c2').value     = cfg.c2; document.getElementById('cfg-c2t').value = cfg.c2;
  document.getElementById('cfg-c3').value     = cfg.c3; document.getElementById('cfg-c3t').value = cfg.c3;
  document.getElementById('cfg-suffix').value = cfg.suffix;
  document.getElementById('cfg-dec').value    = cfg.decimals;
  document.getElementById('config-panel').classList.add('open');
}

document.getElementById('btn-cancel').addEventListener('click', function(){
  document.getElementById('config-panel').classList.remove('open');
});

document.getElementById('btn-ok').addEventListener('click', function(){
  cfg.min      = parseFloat(document.getElementById('cfg-min').value)  || 0;
  cfg.s1       = parseFloat(document.getElementById('cfg-s1').value)   || 33;
  cfg.s2       = parseFloat(document.getElementById('cfg-s2').value)   || 67;
  cfg.max      = parseFloat(document.getElementById('cfg-max').value)  || 100;
  cfg.c1       = document.getElementById('cfg-c1t').value || '#3e8e2a';
  cfg.c2       = document.getElementById('cfg-c2t').value || '#f2e52c';
  cfg.c3       = document.getElementById('cfg-c3t').value || '#ff0000';
  cfg.suffix   = document.getElementById('cfg-suffix').value;
  cfg.decimals = parseInt(document.getElementById('cfg-dec').value) || 0;
  try {
    tableau.extensions.settings.set('gaugeCfg', JSON.stringify(cfg));
    tableau.extensions.settings.saveAsync();
  } catch(e){}
  document.getElementById('config-panel').classList.remove('open');
  draw(currentValue);
});

// ── TABLEAU VIZ EXTENSION API ────────────────────────────────────
function readData(){
  try {
    // Viz Extensions usan worksheetContent
    var ws = tableau.extensions.worksheetContent.worksheet;
    ws.getSummaryDataAsync({ maxRows: 1, ignoreAliases: false, ignoreSelection: true, includeAllColumns: true })
      .then(function(dataTable){
        var rows = dataTable.data;
        var cols = dataTable.columns;
        if(!rows || rows.length === 0){ draw(null); return; }
        var row = rows[0];
        // Buscar primera columna numérica (float o int)
        var val = null;
        for(var i=0; i<cols.length; i++){
          var dt = cols[i].dataType;
          if(dt === 'float' || dt === 'int'){
            var v = parseFloat(row[i].value);
            if(!isNaN(v)){ val = v; break; }
          }
        }
        // Fallback: cualquier valor numérico
        if(val === null){
          for(var j=0; j<row.length; j++){
            var v2 = parseFloat(row[j].value);
            if(!isNaN(v2)){ val = v2; break; }
          }
        }
        currentValue = val;
        draw(val);
      })
      .catch(function(e){ console.error('getSummaryData error:', e); draw(null); });
  } catch(e){
    console.error('readData error:', e);
    draw(null);
  }
}

tableau.extensions.initializeAsync({ configure: openConfig })
  .then(function(){
    // Cargar config guardada
    try {
      var saved = tableau.extensions.settings.get('gaugeCfg');
      if(saved) cfg = Object.assign(cfg, JSON.parse(saved));
    } catch(e){}

    readData();

    // Escuchar cambios de datos
    try {
      var ws = tableau.extensions.worksheetContent.worksheet;
      ws.addEventListener(tableau.TableauEventType.SummaryDataChanged, readData);
    } catch(e){ console.warn('addEventListener error:', e); }
  })
  .catch(function(err){
    // Modo preview fuera de Tableau — mostrar con valor demo
    console.warn('Tableau no disponible, modo demo:', err);
    draw(75);
  });
</script>
</body>
</html>
